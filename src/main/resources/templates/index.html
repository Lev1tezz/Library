<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library - Books</title>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h2>Books</h2>

<div>
  <input type="text" id="search" placeholder="Search by title..."/>
  <select id="categoryFilter">
    <option value="">All Categories</option>
  </select>
  <select id="sortBy">
    <option value="title">Sort by Title</option>
    <option value="published_year">Sort by Year</option>
  </select>
  <button onclick="loadBooks()">Search</button>
</div>

<br/>

<div id="books-container">
  <p>Loading...</p>
</div>

<div id="pagination">
  <button id="prev-btn" onclick="changePage(-1)" disabled>Previous</button>
  <span id="page-info"></span>
  <button id="next-btn" onclick="changePage(1)" disabled>Next</button>
</div>

<script>
  let currentPage = 0;
  const pageSize = 10;

  function getCookie(name) {
      return document.cookie.split(';').map(c => c.trim())
          .find(c => c.startsWith(name + '='))?.split('=')[1];
  }

  function authHeader() {
      return {'Authorization': 'Bearer ' + getCookie('token')};
  }

  if (!getCookie('token')) {
      window.location.href = '/login';
  }

  async function loadCategories() {
      const res = await fetch('/api/categories', {headers: authHeader()});
      if (!res.ok) return;
      const cats = await res.json();
      const select = document.getElementById('categoryFilter');
      cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          select.appendChild(opt);
      });
  }

  async function loadBooks() {
      const search = document.getElementById('search').value.trim();
      const categoryId = document.getElementById('categoryFilter').value;
      const sortBy = document.getElementById('sortBy').value;

      let url = `/api/books?page=${currentPage}&size=${pageSize}&sortBy=${sortBy}`;
      if (search) url += `&search=${encodeURIComponent(search)}`;
      if (categoryId) url += `&categoryId=${categoryId}`;

      try {
          const res = await fetch(url, {headers: authHeader()});

          if (res.status === 401 || res.status === 403) {
              window.location.href = '/login';
              return;
          }

          const data = await res.json();

          renderBooks(data.content || []);

          const totalPages = data.totalPages || 0;
          const currentNum = (data.number || 0) + 1;

          document.getElementById('page-info').textContent =
              ` Page ${currentNum} of ${Math.max(totalPages, 1)} `;
          document.getElementById('prev-btn').disabled = data.first === true;
          document.getElementById('next-btn').disabled = data.last === true;

      } catch (err) {
          console.error('Error loading books:', err);
          document.getElementById('books-container').innerHTML =
              '<p style="color:red">Error loading books. Please refresh.</p>';
      }
  }

  function renderBooks(books) {
      const container = document.getElementById('books-container');
      if (!books.length) {
          container.innerHTML = '<p>No books found.</p>';
          return;
      }
      container.innerHTML = books.map(b => `
          <div style="border:1px solid #ccc; margin:8px 0; padding:10px;">
              <h3><a href="/books/${b.id}">${b.title}</a></h3>
              <p>Category: ${b.categoryName || '-'}</p>
              <p>Authors: ${b.authorNames?.join(', ') || '-'}</p>
              <p>Year: ${b.publishedYear || '-'}</p>
              <p>Available: ${b.availableCopies} / ${b.totalCopies}</p>
          </div>
      `).join('');
  }

  function changePage(direction) {
      currentPage += direction;
      if (currentPage < 0) currentPage = 0;
      loadBooks();
  }

  loadCategories();
  loadBooks();
</script>

</body>
</html>
